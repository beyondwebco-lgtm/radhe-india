<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" width="100%" height="100%">
  <defs>
    <linearGradient id="ribbonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF5722" />
      <stop offset="30%" stop-color="#FF9800" />
      <stop offset="70%" stop-color="#FFB300" />
      <stop offset="100%" stop-color="#E65100" />
    </linearGradient>
    <linearGradient id="ribbonDarkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E65100" />
      <stop offset="100%" stop-color="#BF360C" />
    </linearGradient>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#FFB300" />
    </linearGradient>
  </defs>

  <!-- Globe Ribbon Spiral Icon -->
  <g transform="translate(300, 75) scale(0.85)">
    <!-- Top Arrow Peak -->
    <path d="M 0 -65 L 25 -38 L 8 -42 L 8 -30 L -8 -30 L -8 -42 L -25 -38 Z" fill="url(#ribbonGrad)" />
    
    <!-- Top Spiral Loop -->
    <path d="M -45 -22 C -20 -35 20 -35 45 -22 C 55 -16 55 -5 42 2 C 20 -8 -20 -8 -42 2 C -55 -5 -55 -16 -45 -22 Z" fill="url(#ribbonGrad)" />
    <path d="M -42 2 C -20 12 20 12 42 2 C 48 8 45 16 35 22 C 15 12 -15 12 -35 22 C -45 16 -48 8 -42 2 Z" fill="url(#ribbonDarkGrad)" />
    
    <!-- Middle Spiral Loop -->
    <path d="M -55 12 C -25 -2 25 -2 55 12 C 65 18 62 28 50 34 C 25 20 -25 20 -50 34 C -62 28 -65 18 -55 12 Z" fill="url(#ribbonGrad)" />
    <path d="M -50 34 C -25 46 25 46 50 34 C 55 40 48 48 35 52 C 15 42 -15 42 -35 52 C -48 48 -55 40 -50 34 Z" fill="url(#ribbonDarkGrad)" />
    
    <!-- Bottom Spiral Curve -->
    <path d="M -45 42 C -20 30 20 30 45 42 C 52 48 42 56 25 60 C 10 52 -10 52 -25 60 C -42 56 -52 48 -45 42 Z" fill="url(#ribbonGrad)" />
  </g>

  <!-- Typography -->
  <text x="300" y="170" text-anchor="middle" fill="#FFFFFF" font-family="'Plus Jakarta Sans', 'Outfit', sans-serif" font-weight="900" font-size="34" letter-spacing="2">
    RADHE <tspan fill="url(#goldText)">INDIA</tspan>
  </text>
  <text x="300" y="200" text-anchor="middle" fill="#D4AF37" font-family="'Plus Jakarta Sans', 'Outfit', sans-serif" font-weight="700" font-size="16" letter-spacing="9">
    ENTERPRISES
  </text>
</svg>
